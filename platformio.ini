[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Build options
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Library dependencies
lib_deps = 
    bodmer/TFT_eSPI@^2.5.43
    greiman/SdFat@^2.2.2

; Upload settings
upload_speed = 921600
upload_port = COM*

; Monitor settings
monitor_filters = esp32_exception_decoder
